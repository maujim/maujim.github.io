<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pose Metric Inspector</title>
    <style>
        :root {
            --bg: #050505;
            --panel: rgba(20, 20, 20, 0.9);
            --c-shoulders: #ffcc00;
            --c-hips: #ff00ff;
            --c-left-arm: #00ff00;
            --c-right-arm: #00ccff;
            --c-stance: #ff6633;
            --c-torso: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #viewport {
            position: relative;
            flex-grow: 1;
            width: 100%;
            background: #000;
        }

        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 270px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .pose-card {
            background: var(--panel);
            border-left: 4px solid #fff;
            padding: 8px;
            border-radius: 0 8px 8px 0;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
        }

        .pose-title {
            color: white;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 6px;
            border-bottom: 1px solid #444;
            padding-bottom: 2px;
            letter-spacing: 1px;
        }

        .metric-row {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
        }

        .lbl {
            width: 72px;
            font-size: 9px;
            color: #aaa;
            font-weight: bold;
        }

        .bar-track {
            flex-grow: 1;
            height: 5px;
            background: #333;
            margin: 0 6px;
            border-radius: 2px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }

        .val {
            width: 32px;
            font-size: 10px;
            color: #fff;
            text-align: right;
            font-family: monospace;
        }

        #controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            width: 100%;
            text-align: center;
        }

        button {
            padding: 18px 36px;
            font-size: 16px;
            font-weight: 800;
            background: white;
            color: black;
            border: none;
            cursor: pointer;
            border-radius: 50px;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.3s;
        }

        button:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>
<div id="viewport">
    <video id="webcam" playsinline muted autoplay></video>
    <canvas id="output_canvas"></canvas>

    <div id="hud"></div>

    <div id="controls">
        <button id="btn-main" disabled>Loading AI...</button>
    </div>
</div>

<script type="module">
    import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

    const video = document.getElementById("webcam");
    const canvas = document.getElementById("output_canvas");
    const ctx = canvas.getContext("2d");
    const hud = document.getElementById("hud");
    const btnMain = document.getElementById("btn-main");

    let poseLandmarker;
    let lastVideoTime = -1;

    const POSE_CONNECTIONS = [
        [0, 1], [1, 2], [2, 3], [3, 7],
        [0, 4], [4, 5], [5, 6], [6, 8],
        [9, 10],
        [11, 12], [11, 13], [13, 15], [15, 17], [15, 19], [15, 21],
        [12, 14], [14, 16], [16, 18], [16, 20], [16, 22],
        [11, 23], [12, 24], [23, 24],
        [23, 25], [25, 27], [27, 29], [29, 31],
        [24, 26], [26, 28], [28, 30], [30, 32]
    ];

    async function initAI() {
        try {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
            );

            poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_full/float16/1/pose_landmarker_full.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numPoses: 2,
                minPoseDetectionConfidence: 0.5,
                minPosePresenceConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            btnMain.innerText = "START CAMERA";
            btnMain.removeAttribute("disabled");
            btnMain.addEventListener("click", startCamera);
        } catch (error) {
            console.error(error);
            btnMain.innerText = "ERROR LOADING AI";
        }
    }

    function startCamera() {
        btnMain.style.opacity = "0";

        navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: "user",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        }).then((stream) => {
            video.srcObject = stream;
            video.addEventListener("loadeddata", () => {
                document.getElementById("controls").style.display = "none";
                renderLoop();
            });
        }).catch((err) => {
            console.error(err);
            btnMain.style.opacity = "1";
            btnMain.innerText = "CAMERA DENIED";
        });
    }

    function pointDist(pts, i, j, w, h) {
        const a = pts[i];
        const b = pts[j];
        if (!a || !b) return 0;
        const dx = (a.x - b.x) * w;
        const dy = (a.y - b.y) * h;
        return Math.sqrt(dx * dx + dy * dy);
    }

    function polyLength(pts, indices, w, h) {
        let total = 0;
        for (let i = 0; i < indices.length - 1; i++) {
            total += pointDist(pts, indices[i], indices[i + 1], w, h);
        }
        return total;
    }

    function renderLoop() {
        if (canvas.width !== video.videoWidth) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        }

        const currentTime = performance.now();
        if (video.currentTime !== lastVideoTime) {
            lastVideoTime = video.currentTime;

            const results = poseLandmarker.detectForVideo(video, currentTime);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const w = canvas.width;
            const h = canvas.height;
            let hudHTML = "";

            if (results.landmarks?.length) {
                results.landmarks.forEach((pts, index) => {
                    const shoulderSpan = pointDist(pts, 11, 12, w, h);
                    const hipSpan = pointDist(pts, 23, 24, w, h);
                    const leftArm = polyLength(pts, [11, 13, 15], w, h);
                    const rightArm = polyLength(pts, [12, 14, 16], w, h);
                    const stance = pointDist(pts, 27, 28, w, h);
                    const torso = (pointDist(pts, 11, 23, w, h) + pointDist(pts, 12, 24, w, h)) / 2;

                    const scale = (v) => Math.min((v / 350) * 100, 100);
                    const color = index === 0 ? "#00ffcc" : "#ff66ff";

                    hudHTML += `
                    <div class="pose-card" style="border-left-color: ${color}">
                        <div class="pose-title" style="color:${color}">POSE ${index}</div>

                        <div class="metric-row">
                            <div class="lbl">SHOULDER</div>
                            <div class="bar-track"><div class="bar-fill" style="width:${scale(shoulderSpan)}%; background:var(--c-shoulders)"></div></div>
                            <div class="val">${Math.round(shoulderSpan)}</div>
                        </div>
                        <div class="metric-row">
                            <div class="lbl">HIP</div>
                            <div class="bar-track"><div class="bar-fill" style="width:${scale(hipSpan)}%; background:var(--c-hips)"></div></div>
                            <div class="val">${Math.round(hipSpan)}</div>
                        </div>
                        <div class="metric-row">
                            <div class="lbl">L ARM</div>
                            <div class="bar-track"><div class="bar-fill" style="width:${scale(leftArm)}%; background:var(--c-left-arm)"></div></div>
                            <div class="val">${Math.round(leftArm)}</div>
                        </div>
                        <div class="metric-row">
                            <div class="lbl">R ARM</div>
                            <div class="bar-track"><div class="bar-fill" style="width:${scale(rightArm)}%; background:var(--c-right-arm)"></div></div>
                            <div class="val">${Math.round(rightArm)}</div>
                        </div>
                        <div class="metric-row">
                            <div class="lbl">STANCE</div>
                            <div class="bar-track"><div class="bar-fill" style="width:${scale(stance)}%; background:var(--c-stance)"></div></div>
                            <div class="val">${Math.round(stance)}</div>
                        </div>
                        <div class="metric-row">
                            <div class="lbl">TORSO</div>
                            <div class="bar-track"><div class="bar-fill" style="width:${scale(torso)}%; background:var(--c-torso)"></div></div>
                            <div class="val">${Math.round(torso)}</div>
                        </div>
                    </div>`;

                    const toScreen = (p) => ({ x: (1 - p.x) * w, y: p.y * h });

                    ctx.lineCap = "round";
                    ctx.lineJoin = "round";

                    POSE_CONNECTIONS.forEach(([a, b]) => {
                        const p1 = pts[a];
                        const p2 = pts[b];
                        if (!p1 || !p2) return;

                        const s1 = toScreen(p1);
                        const s2 = toScreen(p2);

                        ctx.strokeStyle = "rgba(255,255,255,0.24)";
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(s1.x, s1.y);
                        ctx.lineTo(s2.x, s2.y);
                        ctx.stroke();
                    });

                    [[11, 12, "#ffcc00"], [23, 24, "#ff00ff"], [11, 13, "#00ff00"], [13, 15, "#00ff00"], [12, 14, "#00ccff"], [14, 16, "#00ccff"], [27, 28, "#ff6633"]]
                        .forEach(([a, b, c]) => {
                            const s1 = toScreen(pts[a]);
                            const s2 = toScreen(pts[b]);
                            ctx.strokeStyle = c;
                            ctx.lineWidth = 5;
                            ctx.beginPath();
                            ctx.moveTo(s1.x, s1.y);
                            ctx.lineTo(s2.x, s2.y);
                            ctx.stroke();
                        });

                    ctx.font = "bold 10px Arial";
                    ctx.textAlign = "left";
                    ctx.textBaseline = "middle";

                    pts.forEach((p, i) => {
                        const s = toScreen(p);
                        ctx.fillStyle = "#ff0000";
                        ctx.beginPath();
                        ctx.arc(s.x, s.y, 3, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.lineWidth = 3;
                        ctx.strokeStyle = "rgba(0,0,0,0.85)";
                        ctx.strokeText(i, s.x + 6, s.y - 6);
                        ctx.fillStyle = "white";
                        ctx.fillText(i, s.x + 6, s.y - 6);
                    });

                    const nose = toScreen(pts[0]);
                    ctx.fillStyle = color;
                    ctx.font = "bold 14px Arial";
                    ctx.fillText(`POSE ${index}`, nose.x + 10, nose.y - 16);
                });
            }

            hud.innerHTML = hudHTML;
        }

        requestAnimationFrame(renderLoop);
    }

    initAI();
</script>
</body>
</html>
