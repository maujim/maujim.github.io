<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Face Metric Inspector</title>
    <style>
        :root {
            --bg: #050505;
            --panel: rgba(20, 20, 20, 0.9);
            --c-eye: #ffcc00;
            --c-mouth: #ff00ff;
            --c-open: #00ff00;
            --c-brow: #00ccff;
            --c-nose: #ff6633;
            --c-face: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #viewport {
            position: relative;
            flex-grow: 1;
            width: 100%;
            background: #000;
        }

        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 280px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .face-card {
            background: var(--panel);
            border-left: 4px solid #fff;
            padding: 8px;
            border-radius: 0 8px 8px 0;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
        }

        .face-title {
            color: white;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 6px;
            border-bottom: 1px solid #444;
            padding-bottom: 2px;
            letter-spacing: 1px;
        }

        .metric-row {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
        }

        .lbl {
            width: 72px;
            font-size: 9px;
            color: #aaa;
            font-weight: bold;
        }

        .bar-track {
            flex-grow: 1;
            height: 5px;
            background: #333;
            margin: 0 6px;
            border-radius: 2px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }

        .val {
            width: 32px;
            font-size: 10px;
            color: #fff;
            text-align: right;
            font-family: monospace;
        }

        #controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            width: 100%;
            text-align: center;
        }

        button {
            padding: 18px 36px;
            font-size: 16px;
            font-weight: 800;
            background: white;
            color: black;
            border: none;
            cursor: pointer;
            border-radius: 50px;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.3s;
        }

        button:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>
<div id="viewport">
    <video id="webcam" playsinline muted autoplay></video>
    <canvas id="output_canvas"></canvas>

    <div id="hud"></div>

    <div id="controls">
        <button id="btn-main" disabled>Loading AI...</button>
    </div>
</div>

<script type="module">
    import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

    const video = document.getElementById("webcam");
    const canvas = document.getElementById("output_canvas");
    const ctx = canvas.getContext("2d");
    const hud = document.getElementById("hud");
    const btnMain = document.getElementById("btn-main");

    let faceLandmarker;
    let lastVideoTime = -1;

    async function initAI() {
        try {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
            );

            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numFaces: 2,
                outputFaceBlendshapes: false,
                outputFacialTransformationMatrixes: false
            });

            btnMain.innerText = "START CAMERA";
            btnMain.removeAttribute("disabled");
            btnMain.addEventListener("click", startCamera);
        } catch (error) {
            console.error(error);
            btnMain.innerText = "ERROR LOADING AI";
        }
    }

    function startCamera() {
        btnMain.style.opacity = "0";

        navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: "user",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        }).then((stream) => {
            video.srcObject = stream;
            video.addEventListener("loadeddata", () => {
                document.getElementById("controls").style.display = "none";
                renderLoop();
            });
        }).catch((err) => {
            console.error(err);
            btnMain.style.opacity = "1";
            btnMain.innerText = "CAMERA DENIED";
        });
    }

    function pointDist(pts, i, j, w, h) {
        const a = pts[i];
        const b = pts[j];
        if (!a || !b) return 0;
        const dx = (a.x - b.x) * w;
        const dy = (a.y - b.y) * h;
        return Math.sqrt(dx * dx + dy * dy);
    }

    function drawPath(pts, indices, color, width, toScreen) {
        if (!indices.length) return;
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.beginPath();
        const start = toScreen(pts[indices[0]]);
        ctx.moveTo(start.x, start.y);
        for (let i = 1; i < indices.length; i++) {
            const p = toScreen(pts[indices[i]]);
            ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();
    }

    function renderLoop() {
        if (canvas.width !== video.videoWidth) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        }

        const currentTime = performance.now();
        if (video.currentTime !== lastVideoTime) {
            lastVideoTime = video.currentTime;

            const results = faceLandmarker.detectForVideo(video, currentTime);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const w = canvas.width;
            const h = canvas.height;
            let hudHTML = "";

            if (results.faceLandmarks?.length) {
                results.faceLandmarks.forEach((pts, index) => {
                    const eyeSpan = pointDist(pts, 33, 263, w, h);
                    const mouthWidth = pointDist(pts, 61, 291, w, h);
                    const mouthOpen = pointDist(pts, 13, 14, w, h);
                    const browSpan = pointDist(pts, 70, 300, w, h);
                    const noseToChin = pointDist(pts, 1, 152, w, h);
                    const faceWidth = pointDist(pts, 234, 454, w, h);

                    const scale = (v) => Math.min((v / 250) * 100, 100);
                    const color = index === 0 ? "#00ffcc" : "#ff66ff";

                    hudHTML += `
                    <div class="face-card" style="border-left-color: ${color}">
                        <div class="face-title" style="color:${color}">FACE ${index}</div>

                        <div class="metric-row">
                            <div class="lbl">EYE SPAN</div>
                            <div class="bar-track"><div class="bar-fill" style="width:${scale(eyeSpan)}%; background:var(--c-eye)"></div></div>
                            <div class="val">${Math.round(eyeSpan)}</div>
                        </div>
                        <div class="metric-row">
                            <div class="lbl">MOUTH W</div>
                            <div class="bar-track"><div class="bar-fill" style="width:${scale(mouthWidth)}%; background:var(--c-mouth)"></div></div>
                            <div class="val">${Math.round(mouthWidth)}</div>
                        </div>
                        <div class="metric-row">
                            <div class="lbl">MOUTH O</div>
                            <div class="bar-track"><div class="bar-fill" style="width:${scale(mouthOpen)}%; background:var(--c-open)"></div></div>
                            <div class="val">${Math.round(mouthOpen)}</div>
                        </div>
                        <div class="metric-row">
                            <div class="lbl">BROW</div>
                            <div class="bar-track"><div class="bar-fill" style="width:${scale(browSpan)}%; background:var(--c-brow)"></div></div>
                            <div class="val">${Math.round(browSpan)}</div>
                        </div>
                        <div class="metric-row">
                            <div class="lbl">NOSE-CH</div>
                            <div class="bar-track"><div class="bar-fill" style="width:${scale(noseToChin)}%; background:var(--c-nose)"></div></div>
                            <div class="val">${Math.round(noseToChin)}</div>
                        </div>
                        <div class="metric-row">
                            <div class="lbl">FACE W</div>
                            <div class="bar-track"><div class="bar-fill" style="width:${scale(faceWidth)}%; background:var(--c-face)"></div></div>
                            <div class="val">${Math.round(faceWidth)}</div>
                        </div>
                    </div>`;

                    const toScreen = (p) => ({ x: (1 - p.x) * w, y: p.y * h });

                    // Light point cloud
                    pts.forEach((p) => {
                        const s = toScreen(p);
                        ctx.fillStyle = "rgba(255,255,255,0.35)";
                        ctx.beginPath();
                        ctx.arc(s.x, s.y, 1.3, 0, Math.PI * 2);
                        ctx.fill();
                    });

                    // Highlighted feature curves
                    drawPath(pts, [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109, 10], "rgba(255,255,255,0.25)", 1.5, toScreen);
                    drawPath(pts, [33, 133, 159, 145, 33], "#ffcc00", 3, toScreen);
                    drawPath(pts, [362, 263, 386, 374, 362], "#ffcc00", 3, toScreen);
                    drawPath(pts, [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 78, 61], "#ff00ff", 3, toScreen);
                    drawPath(pts, [70, 63, 105, 66, 107], "#00ccff", 3, toScreen);
                    drawPath(pts, [336, 296, 334, 293, 300], "#00ccff", 3, toScreen);
                    drawPath(pts, [1, 2, 5, 4, 1], "#ff6633", 3, toScreen);

                    // Label a few key ids for debugging
                    [1, 33, 61, 13, 14, 152, 263, 291].forEach((i) => {
                        const s = toScreen(pts[i]);
                        ctx.font = "bold 10px Arial";
                        ctx.lineWidth = 3;
                        ctx.strokeStyle = "rgba(0,0,0,0.8)";
                        ctx.strokeText(i, s.x + 6, s.y - 6);
                        ctx.fillStyle = "white";
                        ctx.fillText(i, s.x + 6, s.y - 6);
                    });

                    const nose = toScreen(pts[1]);
                    ctx.fillStyle = color;
                    ctx.font = "bold 14px Arial";
                    ctx.fillText(`FACE ${index}`, nose.x + 10, nose.y - 16);
                });
            }

            hud.innerHTML = hudHTML;
        }

        requestAnimationFrame(renderLoop);
    }

    initAI();
</script>
</body>
</html>
