<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LEGO Grid Editor v0 (Hand + Infinite Side Pile)</title>
  <style>
    :root {
      --bg: #090909;
      --panel: rgba(18, 18, 18, 0.82);
      --accent: #49d2ff;
      --warn: #ff6159;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: Inter, Segoe UI, Roboto, sans-serif;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #three {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: radial-gradient(circle at 20% 0%, #1f2230 0%, #0f1119 48%, #07080c 100%);
      cursor: grab;
    }

    #three.dragging {
      cursor: grabbing;
    }

    #overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 7;
    }

    #webcam {
      position: absolute;
      right: 12px;
      bottom: 12px;
      width: min(28vw, 280px);
      aspect-ratio: 16 / 9;
      object-fit: cover;
      transform: scaleX(-1);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
      background: #000;
      z-index: 8;
    }

    #hud {
      position: absolute;
      left: 10px;
      top: 10px;
      width: 320px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .card {
      background: var(--panel);
      color: #efefef;
      border-left: 4px solid #fff;
      border-radius: 0 9px 9px 0;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      padding: 8px 10px;
      font-size: 12px;
    }

    .title {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 800;
      color: #fff;
      margin-bottom: 4px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      padding-bottom: 3px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin: 2px 0;
      color: #ddd;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #fff;
    }

    #hint {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 9;
      font-size: 12px;
      color: #ddd;
      background: rgba(0, 0, 0, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      padding: 6px 8px;
      pointer-events: none;
      max-width: min(62vw, 780px);
    }

    #controls {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 15;
      text-align: center;
      width: 100%;
      pointer-events: none;
    }

    #btn-main {
      pointer-events: auto;
      border: none;
      border-radius: 999px;
      padding: 16px 30px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.6px;
      color: #000;
      background: #fff;
      box-shadow: 0 0 24px rgba(255, 255, 255, 0.35);
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.2s ease;
    }

    #btn-main:disabled {
      background: #404040;
      color: #9d9d9d;
      cursor: not-allowed;
      box-shadow: none;
    }
  </style>
</head>
<body>
<div id="app">
  <canvas id="three"></canvas>
  <canvas id="overlay"></canvas>
  <video id="webcam" playsinline muted autoplay></video>

  <div id="hud"></div>
  <div id="hint">Pinch on a brick to pick it up. Unpinch to drop. Left side is an infinite supply spot: if empty, a new red brick spawns every second.</div>

  <div id="controls">
    <button id="btn-main" disabled>Loading Hand AI...</button>
  </div>
</div>

<script type="module">
  import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js";
  import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

  const canvas = document.getElementById("three");
  const overlay = document.getElementById("overlay");
  const octx = overlay.getContext("2d");
  const video = document.getElementById("webcam");
  const hud = document.getElementById("hud");
  const btnMain = document.getElementById("btn-main");

  const GRID_COLS = 16;
  const GRID_ROWS = 16;
  const STUD = 1;
  const BRICK_W = 2;
  const BRICK_D = 3;

  // Side supply pile behavior
  const PILE_SPAWN = { x: -GRID_COLS * 0.5 - 1.9, z: 0 };
  const PILE_OCCUPY_RADIUS = 0.75;
  const PILE_SPAWN_POLL_MS = 1000;

  // Pinch ring scaling: increase effective pinch radius by 9%
  const PINCH_RING_SCALE = 1.09;
  const PINCH_ON_THRESHOLD = 0.43 * PINCH_RING_SCALE;
  const PINCH_OFF_THRESHOLD = 0.58 * PINCH_RING_SCALE;

  const HAND_LINKS = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [0,9],[9,10],[10,11],[11,12],
    [0,13],[13,14],[14,15],[15,16],
    [0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]
  ];

  const bricks = [];
  let brickIdSeq = 1;

  const state = {
    handLandmarker: null,
    lastVideoTime: -1,
    hasHand: false,
    handLabel: "-",
    pinchDown: false,
    pinchStrength: 0,
    pinchOnFrames: 0,
    pinchOffFrames: 0,

    hoveredBrick: null,
    selectedBrick: null,
    draggingBrick: null,
    dragStart: null,

    pointerNDC: new THREE.Vector2(),
    pointerWorld: new THREE.Vector3(),
    pointerVisible: false,

    targetCornerI: 6,
    targetCornerJ: 6,
    validPlacement: true
  };

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x0a0e14, 14, 40);

  const camera = new THREE.PerspectiveCamera(46, window.innerWidth / window.innerHeight, 0.1, 120);
  camera.position.set(0, 14, 13);
  camera.lookAt(0, 0, 0);

  scene.add(new THREE.HemisphereLight(0xbfd5ff, 0x202020, 0.95));
  const dir = new THREE.DirectionalLight(0xffffff, 1.1);
  dir.position.set(8, 18, 6);
  scene.add(dir);

  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  const raycaster = new THREE.Raycaster();

  const floor = new THREE.Mesh(
    new THREE.BoxGeometry(GRID_COLS * STUD + 0.4, 0.22, GRID_ROWS * STUD + 0.4),
    new THREE.MeshStandardMaterial({ color: 0x243042, roughness: 0.86, metalness: 0.06 })
  );
  floor.position.y = -0.12;
  scene.add(floor);

  // supply pad to show side spawn spot
  const supplyPad = new THREE.Mesh(
    new THREE.CylinderGeometry(1.0, 1.0, 0.09, 28),
    new THREE.MeshStandardMaterial({ color: 0x3d2a2a, roughness: 0.82, metalness: 0.05 })
  );
  supplyPad.position.set(PILE_SPAWN.x, 0.04, PILE_SPAWN.z);
  scene.add(supplyPad);

  const supplyRing = new THREE.Mesh(
    new THREE.TorusGeometry(1.02, 0.04, 16, 48),
    new THREE.MeshStandardMaterial({ color: 0x7f3a3a, emissive: 0x2f0f0f, roughness: 0.6, metalness: 0.2 })
  );
  supplyRing.rotation.x = Math.PI / 2;
  supplyRing.position.set(PILE_SPAWN.x, 0.08, PILE_SPAWN.z);
  scene.add(supplyRing);

  const studGeo = new THREE.CylinderGeometry(0.23, 0.23, 0.1, 18);
  const studMat = new THREE.MeshStandardMaterial({ color: 0x2f3f56, roughness: 0.7, metalness: 0.12 });
  const studs = new THREE.InstancedMesh(studGeo, studMat, GRID_COLS * GRID_ROWS);
  const temp = new THREE.Object3D();
  let idx = 0;
  for (let i = 0; i < GRID_COLS; i++) {
    for (let j = 0; j < GRID_ROWS; j++) {
      temp.position.set(-GRID_COLS * 0.5 + i + 0.5, 0.05, -GRID_ROWS * 0.5 + j + 0.5);
      temp.updateMatrix();
      studs.setMatrixAt(idx++, temp.matrix);
    }
  }
  scene.add(studs);

  const gridHelper = new THREE.GridHelper(GRID_COLS, GRID_COLS, 0x34445e, 0x2a3550);
  gridHelper.position.y = 0.001;
  scene.add(gridHelper);

  function makeBrick(color = 0xd22f2f, transparent = false) {
    const group = new THREE.Group();
    const pickables = [];

    const bodyMat = new THREE.MeshStandardMaterial({
      color,
      roughness: 0.42,
      metalness: 0.16,
      transparent,
      opacity: transparent ? 0.35 : 1,
      emissive: 0x000000,
      emissiveIntensity: 0
    });

    const body = new THREE.Mesh(
      new THREE.BoxGeometry(BRICK_W * STUD, 0.58, BRICK_D * STUD),
      bodyMat
    );
    body.position.y = 0.29;
    pickables.push(body);
    group.add(body);

    const studTopMat = new THREE.MeshStandardMaterial({
      color: transparent ? 0xbafcff : 0xf15f5f,
      roughness: 0.36,
      metalness: 0.22,
      transparent,
      opacity: transparent ? 0.4 : 1,
      emissive: 0x000000,
      emissiveIntensity: 0
    });

    for (let i = 0; i < BRICK_W; i++) {
      for (let j = 0; j < BRICK_D; j++) {
        const s = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.1, 18), studTopMat);
        s.position.set(-BRICK_W / 2 + i + 0.5, 0.63, -BRICK_D / 2 + j + 0.5);
        pickables.push(s);
        group.add(s);
      }
    }

    group.userData = { bodyMat, studTopMat, pickables };
    return group;
  }

  function clamp(v, lo, hi) {
    return Math.max(lo, Math.min(hi, v));
  }

  function dist2(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y);
  }

  function toScreen(p, w, h) {
    return { x: (1 - p.x) * w, y: p.y * h };
  }

  function cornerToWorld(i, j) {
    return {
      x: -GRID_COLS * 0.5 + i + BRICK_W * 0.5,
      z: -GRID_ROWS * 0.5 + j + BRICK_D * 0.5
    };
  }

  function worldToCornerRaw(x, z) {
    return {
      i: Math.round(x + GRID_COLS * 0.5 - BRICK_W * 0.5),
      j: Math.round(z + GRID_ROWS * 0.5 - BRICK_D * 0.5)
    };
  }

  function isValidCorner(i, j) {
    return i >= 0 && i <= GRID_COLS - BRICK_W && j >= 0 && j <= GRID_ROWS - BRICK_D;
  }

  function worldToCornerClamped(x, z) {
    const raw = worldToCornerRaw(x, z);
    return {
      i: clamp(raw.i, 0, GRID_COLS - BRICK_W),
      j: clamp(raw.j, 0, GRID_ROWS - BRICK_D)
    };
  }

  function getBrickCenterXZ(brickData) {
    if (brickData.onGrid) return cornerToWorld(brickData.cornerI, brickData.cornerJ);
    return { x: brickData.worldX, z: brickData.worldZ };
  }

  function syncBrickPose(brickData, lift = false) {
    const p = getBrickCenterXZ(brickData);
    brickData.group.position.set(p.x, lift ? 0.82 : 0, p.z);
  }

  function syncAllBrickPoses() {
    for (const b of bricks) {
      if (state.draggingBrick && b.id === state.draggingBrick.id) continue;
      syncBrickPose(b, false);
    }
  }

  function pointInsideBrickXZ(worldPoint, brickData, tolerance = 0.28) {
    const c = getBrickCenterXZ(brickData);
    return Math.abs(worldPoint.x - c.x) <= BRICK_W * 0.5 + tolerance &&
           Math.abs(worldPoint.z - c.z) <= BRICK_D * 0.5 + tolerance;
  }

  function setGhostColor(valid) {
    const bodyMat = ghostBrick.userData.bodyMat;
    const studMat = ghostBrick.userData.studTopMat;
    if (valid) {
      bodyMat.color.setHex(0x49d2ff);
      studMat.color.setHex(0xbafcff);
    } else {
      bodyMat.color.setHex(0xff6159);
      studMat.color.setHex(0xffb8b3);
    }
  }

  function createBrickInstance({ onGrid = false, cornerI = 0, cornerJ = 0, worldX = 0, worldZ = 0 } = {}) {
    const group = makeBrick(0xd22f2f, false);
    const data = {
      id: brickIdSeq++,
      group,
      onGrid,
      cornerI,
      cornerJ,
      worldX,
      worldZ
    };

    group.userData.brickData = data;
    for (const mesh of group.userData.pickables) {
      mesh.userData.brickData = data;
    }

    bricks.push(data);
    scene.add(group);
    syncBrickPose(data, false);
    return data;
  }

  function isPileSpotEmpty() {
    return !bricks.some((b) => {
      const c = getBrickCenterXZ(b);
      return Math.hypot(c.x - PILE_SPAWN.x, c.z - PILE_SPAWN.z) <= PILE_OCCUPY_RADIUS;
    });
  }

  function maybeSpawnSupplyBrick() {
    if (!isPileSpotEmpty()) return;
    createBrickInstance({ onGrid: false, worldX: PILE_SPAWN.x, worldZ: PILE_SPAWN.z });
  }

  const ghostBrick = makeBrick(0x49d2ff, true);
  ghostBrick.visible = false;
  scene.add(ghostBrick);

  const pointer = new THREE.Mesh(
    new THREE.SphereGeometry(0.16, 18, 18),
    new THREE.MeshStandardMaterial({ color: 0x49d2ff, emissive: 0x0c4b64, roughness: 0.3, metalness: 0.2 })
  );
  pointer.visible = false;
  scene.add(pointer);

  // Shared selection decorators that move between bricks
  const hoverOutline = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(BRICK_W * 1.03, 0.62, BRICK_D * 1.03)),
    new THREE.LineBasicMaterial({ color: 0x89e5ff, transparent: true, opacity: 0.45 })
  );
  hoverOutline.position.y = 0.31;
  hoverOutline.visible = false;
  scene.add(hoverOutline);

  const selectedOutline = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(BRICK_W * 1.06, 0.66, BRICK_D * 1.06)),
    new THREE.LineBasicMaterial({ color: 0x49d2ff, transparent: true, opacity: 1 })
  );
  selectedOutline.position.y = 0.31;
  selectedOutline.visible = false;
  scene.add(selectedOutline);

  const gizmo = new THREE.AxesHelper(1.7);
  gizmo.position.set(0, 0.95, 0);
  gizmo.visible = false;
  scene.add(gizmo);

  function attachDecorator(decorator, brickData) {
    if (!brickData) {
      decorator.visible = false;
      return;
    }
    if (decorator.parent !== brickData.group) {
      brickData.group.add(decorator);
    }
    decorator.visible = true;
  }

  function updateSelectionVisuals() {
    const hovered = state.hoveredBrick;
    const selected = state.selectedBrick;

    attachDecorator(hoverOutline, hovered && (!selected || hovered.id !== selected.id) ? hovered : null);
    attachDecorator(selectedOutline, selected);
    attachDecorator(gizmo, selected);

    for (const b of bricks) {
      const isSelected = selected && b.id === selected.id;
      const isHovered = hovered && b.id === hovered.id;
      const boost = isSelected ? 0.12 : isHovered ? 0.06 : 0;
      b.group.userData.bodyMat.emissive.setHex(0x4a88aa);
      b.group.userData.bodyMat.emissiveIntensity = boost;
      b.group.userData.studTopMat.emissive.setHex(0x74d6ff);
      b.group.userData.studTopMat.emissiveIntensity = boost * 0.9;
    }
  }

  function updatePointerAndPlaneHit() {
    raycaster.setFromCamera(state.pointerNDC, camera);

    const world = new THREE.Vector3();
    const ok = raycaster.ray.intersectPlane(plane, world);

    state.pointerVisible = !!ok;
    pointer.visible = !!ok;

    if (!ok) return null;

    state.pointerWorld.copy(world);
    pointer.position.copy(world);
    pointer.position.y = 0.25;

    return world;
  }

  function updateHoverFromPointer() {
    // 1) mesh hit test (most precise)
    raycaster.setFromCamera(state.pointerNDC, camera);
    const pickables = bricks.flatMap((b) => b.group.userData.pickables);
    const hits = raycaster.intersectObjects(pickables, true);

    if (hits.length > 0) {
      state.hoveredBrick = hits[0].object.userData.brickData || null;
      return;
    }

    // 2) footprint tolerance fallback (more forgiving)
    if (!state.pointerVisible) {
      state.hoveredBrick = null;
      return;
    }

    let best = null;
    let bestDist = Infinity;
    for (const b of bricks) {
      if (!pointInsideBrickXZ(state.pointerWorld, b, 0.28)) continue;
      const c = getBrickCenterXZ(b);
      const d = Math.hypot(state.pointerWorld.x - c.x, state.pointerWorld.z - c.z);
      if (d < bestDist) {
        best = b;
        bestDist = d;
      }
    }

    state.hoveredBrick = best;
  }

  function updateDragTarget(world) {
    const raw = worldToCornerRaw(world.x, world.z);
    state.validPlacement = isValidCorner(raw.i, raw.j);

    const corner = state.validPlacement ? raw : worldToCornerClamped(world.x, world.z);
    state.targetCornerI = corner.i;
    state.targetCornerJ = corner.j;

    const p = cornerToWorld(corner.i, corner.j);
    ghostBrick.position.set(p.x, 0.01, p.z);
    ghostBrick.visible = true;
    setGhostColor(state.validPlacement);

    if (state.draggingBrick) {
      state.draggingBrick.group.position.set(p.x, 0.82, p.z);
    }
  }

  function startDraggingBrick(brickData) {
    state.selectedBrick = brickData;
    state.draggingBrick = brickData;
    state.dragStart = {
      onGrid: brickData.onGrid,
      cornerI: brickData.cornerI,
      cornerJ: brickData.cornerJ,
      worldX: brickData.worldX,
      worldZ: brickData.worldZ
    };
    canvas.classList.add("dragging");
  }

  function finishDragging({ commit = true } = {}) {
    const b = state.draggingBrick;
    if (!b) return;

    if (commit && state.validPlacement) {
      b.onGrid = true;
      b.cornerI = state.targetCornerI;
      b.cornerJ = state.targetCornerJ;
    } else if (state.dragStart) {
      b.onGrid = state.dragStart.onGrid;
      b.cornerI = state.dragStart.cornerI;
      b.cornerJ = state.dragStart.cornerJ;
      b.worldX = state.dragStart.worldX;
      b.worldZ = state.dragStart.worldZ;
    }

    syncBrickPose(b, false);

    state.draggingBrick = null;
    state.dragStart = null;
    state.selectedBrick = null; // always clear selection after unpinch
    state.validPlacement = true;
    ghostBrick.visible = false;
    canvas.classList.remove("dragging");
  }

  function drawHandDebug(pts, w, h, cursor) {
    octx.clearRect(0, 0, w, h);

    octx.lineCap = "round";
    octx.lineJoin = "round";
    octx.strokeStyle = "rgba(255,212,0,0.85)";
    octx.lineWidth = 2;

    HAND_LINKS.forEach(([a, b]) => {
      const p1 = toScreen(pts[a], w, h);
      const p2 = toScreen(pts[b], w, h);
      octx.beginPath();
      octx.moveTo(p1.x, p1.y);
      octx.lineTo(p2.x, p2.y);
      octx.stroke();
    });

    pts.forEach((p, i) => {
      const s = toScreen(p, w, h);
      octx.fillStyle = i === 4 || i === 8 ? "#49d2ff" : "#ff5ca8";
      octx.beginPath();
      octx.arc(s.x, s.y, i === 4 || i === 8 ? 4 : 2.3, 0, Math.PI * 2);
      octx.fill();
    });

    const c = toScreen(cursor, w, h);
    octx.strokeStyle = state.pinchDown ? "#49d2ff" : "#ffffff";
    octx.lineWidth = 3;
    octx.beginPath();
    octx.arc(c.x, c.y, 14, 0, Math.PI * 2);
    octx.stroke();
  }

  async function initAI() {
    try {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
      );

      state.handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numHands: 1
      });

      btnMain.textContent = "Start Camera";
      btnMain.disabled = false;
      btnMain.addEventListener("click", startCamera);
    } catch (err) {
      console.error(err);
      btnMain.textContent = "AI Load Error";
    }
  }

  async function startCamera() {
    btnMain.style.opacity = "0";
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "user",
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      });

      video.srcObject = stream;
      video.addEventListener("loadeddata", () => {
        document.getElementById("controls").style.display = "none";
      }, { once: true });
    } catch (err) {
      console.error(err);
      btnMain.style.opacity = "1";
      btnMain.textContent = "Camera Denied";
    }
  }

  function updateFromHand() {
    if (!state.handLandmarker || !video.videoWidth) return;
    if (video.currentTime === state.lastVideoTime) return;
    state.lastVideoTime = video.currentTime;

    const results = state.handLandmarker.detectForVideo(video, performance.now());

    if (!results.landmarks?.length) {
      state.hasHand = false;
      state.handLabel = "-";
      state.hoveredBrick = null;
      state.pinchDown = false;
      state.pinchOnFrames = 0;
      state.pinchOffFrames = 0;
      state.pointerVisible = false;
      pointer.visible = false;

      if (state.draggingBrick) {
        finishDragging({ commit: false });
      }

      octx.clearRect(0, 0, overlay.width, overlay.height);
      updateSelectionVisuals();
      return;
    }

    const pts = results.landmarks[0];
    state.handLabel = results.handedness?.[0]?.[0]?.categoryName || "Unknown";
    state.hasHand = true;

    const pinch = dist2(pts[4], pts[8]);
    const palm = Math.max(0.0001, dist2(pts[5], pts[17]));
    const pinchNorm = pinch / palm;
    state.pinchStrength = clamp(1 - (pinchNorm - 0.25) / 0.55, 0, 1);

    const pinchOn = pinchNorm < PINCH_ON_THRESHOLD;
    const pinchOff = pinchNorm > PINCH_OFF_THRESHOLD;
    const prevPinch = state.pinchDown;

    // Debounce pinch edges to avoid accidental drop/re-grab from landmark jitter.
    if (!state.pinchDown) {
      state.pinchOnFrames = pinchOn ? state.pinchOnFrames + 1 : 0;
      state.pinchOffFrames = 0;
      if (state.pinchOnFrames >= 2) {
        state.pinchDown = true;
        state.pinchOnFrames = 0;
      }
    } else {
      state.pinchOffFrames = pinchOff ? state.pinchOffFrames + 1 : 0;
      state.pinchOnFrames = 0;
      if (state.pinchOffFrames >= 3) {
        state.pinchDown = false;
        state.pinchOffFrames = 0;
      }
    }

    const pinchStarted = !prevPinch && state.pinchDown;
    const pinchEnded = prevPinch && !state.pinchDown;

    const cursor = {
      x: (pts[4].x + pts[8].x) * 0.5,
      y: (pts[4].y + pts[8].y) * 0.5
    };

    // mirror X to match mirrored webcam UX
    state.pointerNDC.set((1 - cursor.x) * 2 - 1, 1 - cursor.y * 2);

    const world = updatePointerAndPlaneHit();
    state.hoveredBrick = null;
    if (world) updateHoverFromPointer();

    if (pinchStarted) {
      if (state.hoveredBrick) {
        startDraggingBrick(state.hoveredBrick);
      } else {
        state.selectedBrick = null;
      }
    }

    if (state.draggingBrick && world) {
      updateDragTarget(world);
    } else if (!state.draggingBrick) {
      ghostBrick.visible = false;
      state.validPlacement = true;
    }

    if (pinchEnded) {
      if (state.draggingBrick) {
        finishDragging({ commit: true });
      } else {
        state.selectedBrick = null;
      }
    }

    drawHandDebug(pts, overlay.width, overlay.height, cursor);
    updateSelectionVisuals();
  }

  function renderHud() {
    const selected = state.selectedBrick;
    const hovering = state.hoveredBrick;
    const dragging = !!state.draggingBrick;
    const selectedCenter = selected ? getBrickCenterXZ(selected) : null;

    hud.innerHTML = `
      <div class="card" style="border-left-color:#49d2ff">
        <div class="title">Hand + Selection</div>
        <div class="row"><span>Hand</span><span class="mono">${state.hasHand ? state.handLabel : "-"}</span></div>
        <div class="row"><span>Pinch</span><span class="mono">${state.pinchDown ? "DOWN" : "UP"}</span></div>
        <div class="row"><span>Pinch strength</span><span class="mono">${Math.round(state.pinchStrength * 100)}%</span></div>
        <div class="row"><span>Hover</span><span class="mono">${hovering ? `BRICK ${hovering.id}` : "NO"}</span></div>
        <div class="row"><span>Selected</span><span class="mono">${selected ? `BRICK ${selected.id}` : "NO"}</span></div>
        <div class="row"><span>Dragging</span><span class="mono">${dragging ? `BRICK ${state.draggingBrick.id}` : "NO"}</span></div>
      </div>

      <div class="card" style="border-left-color:${state.validPlacement ? "#49d2ff" : "#ff6159"}">
        <div class="title">Placement</div>
        <div class="row"><span>Total bricks</span><span class="mono">${bricks.length}</span></div>
        <div class="row"><span>Supply spot</span><span class="mono">${isPileSpotEmpty() ? "EMPTY" : "OCCUPIED"}</span></div>
        <div class="row"><span>Target I,J</span><span class="mono">${state.targetCornerI}, ${state.targetCornerJ}</span></div>
        <div class="row"><span>Valid target</span><span class="mono">${state.validPlacement ? "YES" : "NO"}</span></div>
        <div class="row"><span>Selected X,Z</span><span class="mono">${selectedCenter ? `${selectedCenter.x.toFixed(1)}, ${selectedCenter.z.toFixed(1)}` : "-"}</span></div>
      </div>
    `;
  }

  function tick() {
    updateFromHand();
    syncAllBrickPoses();

    const t = performance.now() * 0.001;
    pointer.material.emissiveIntensity = state.pointerVisible ? (0.5 + Math.sin(t * 6) * 0.15) : 0;
    supplyRing.material.emissiveIntensity = isPileSpotEmpty() ? 0.6 : 0.25;

    renderHud();
    renderer.render(scene, camera);
    requestAnimationFrame(tick);
  }

  function resize() {
    const w = window.innerWidth;
    const h = window.innerHeight;

    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();

    overlay.width = w;
    overlay.height = h;
  }

  window.addEventListener("resize", resize);
  resize();

  // Start with one side supply brick and poll spawn continuously.
  maybeSpawnSupplyBrick();
  setInterval(maybeSpawnSupplyBrick, PILE_SPAWN_POLL_MS);

  initAI();
  tick();
</script>
</body>
</html>
